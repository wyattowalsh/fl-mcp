name: Feature Request
description: Suggest an idea or enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternatives or trade-offs considered.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define clear criteria for completion.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
