name: Security and License Automation

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-license-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: none

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Sync dependencies
        run: uv sync --all-extras --dev --locked
      - name: Run vulnerability audit
        run: uv run --with pip-audit==2.10.0 pip-audit

  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Sync dependencies
        run: uv sync --all-extras --dev --locked
      - name: Export machine-readable license report
        run: uv run --with pip-licenses==5.5.1 pip-licenses --format=json --output-file THIRD_PARTY_LICENSES.json
      - name: Enforce license denylist
        run: |
          python - <<'PY'
          import json
          import re
          import sys

          denylist = {
              "AGPL",
              "AGPLv3",
              "AGPL-1.0",
              "AGPL-3.0",
              "AGPL-3.0-only",
              "AGPL-3.0-or-later",
              "GNU Affero General Public License v3",
              "GNU Affero General Public License v3 (AGPLv3)",
              "GPL",
              "GPLv2",
              "GPLv3",
              "GPL-1.0",
              "GPL-2.0",
              "GPL-2.0-only",
              "GPL-2.0-or-later",
              "GPL-3.0",
              "GPL-3.0-only",
              "GPL-3.0-or-later",
              "GNU General Public License",
              "GNU General Public License (GPL)",
              "GNU General Public License v2",
              "GNU General Public License v2 (GPLv2)",
              "GNU General Public License v3",
              "GNU General Public License v3 (GPLv3)",
              "SSPL",
              "SSPL-1.0",
              "Server Side Public License",
              "Server Side Public License (SSPL)",
          }

          with open("THIRD_PARTY_LICENSES.json", encoding="utf-8") as handle:
              dependencies = json.load(handle)

          violations = []
          for dependency in dependencies:
              raw_license = str(dependency.get("License", "")).strip()
              if not raw_license:
                  continue
              tokens = [
                  token.strip()
                  for token in re.split(r"\s*(?:,|;|/|\\| and )\s*", raw_license)
                  if token.strip()
              ]
              matched = sorted({token for token in tokens if token in denylist})
              # Fail only when all declared license tokens are disallowed.
              # This avoids false positives on dual-licensed packages where
              # a permissive option is available.
              if matched and len(matched) == len(set(tokens)):
                  package_name = dependency.get("Name", "<unknown>")
                  violations.append((package_name, matched))

          if violations:
              print("Disallowed license detected:")
              for package_name, matched in violations:
                  print(f"- {package_name}: {', '.join(matched)}")
              sys.exit(1)

          print("No disallowed licenses found.")
          PY
