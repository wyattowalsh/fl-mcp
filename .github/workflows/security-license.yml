name: Security and License Automation

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit cyclonedx-bom
      - name: Run vulnerability audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found; cannot audit dependencies"
            exit 1
          fi
      - name: Build SBOM
        run: |
          cyclonedx-py requirements -o sbom.xml
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.xml

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install license tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses
      - name: License policy check
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip-licenses --format=markdown --with-license-file --output-file THIRD_PARTY_LICENSES.md
          if grep -E "GPL|AGPL|SSPL" THIRD_PARTY_LICENSES.md; then
            echo "Disallowed license found"
            exit 1
          fi
