name: Prerelease

on:
  workflow_dispatch:
    inputs:
      version:
        description: Prerelease version (example: 1.2.0rc1)
        required: true

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  gate-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/unit ]; then pytest -q tests/unit; else echo "missing tests/unit"; exit 1; fi

  gate-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/integration ]; then pytest -q tests/integration; else echo "missing tests/integration"; exit 1; fi

  gate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/contract ]; then pytest -q tests/contract; else echo "missing tests/contract"; exit 1; fi

  gate-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          if [ -f Makefile ] && grep -q "^docs:" Makefile; then make docs; else echo "missing docs target"; exit 1; fi
      - run: git diff --exit-code

  gate-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pre-commit pip-audit build twine
      - run: pre-commit run --all-files
      - run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; else echo "missing requirements.txt"; exit 1; fi

  build:
    runs-on: ubuntu-latest
    needs: [gate-unit, gate-integration, gate-contract, gate-docs-sync, gate-policy]
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - id: version
        run: echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-prerelease
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: prerelease
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-prerelease
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-prerelease
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: dist/*

  deploy-docs:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Deploy prerelease docs here (mkdocs gh-deploy, Pages, etc.)"

  publish-docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:prerelease
            ghcr.io/${{ github.repository }}:${{ needs.build.outputs.version }}
