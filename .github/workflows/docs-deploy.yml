name: Docs Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'
      - '!v*.*.*rc*'
      - '!v*.*.*alpha*'
      - '!v*.*.*beta*'

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: none

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: '9.15.4'
      - name: Sync Python dependencies for docs reference generation
        run: uv sync --all-extras --dev --locked
      - name: Install dependencies
        run: pnpm --dir docs --ignore-workspace install --frozen-lockfile
      - name: Verify generated docs references
        run: pnpm --dir docs --ignore-workspace docs:verify-reference
      - name: Lint docs package
        run: pnpm --dir docs --ignore-workspace lint
      - name: Check docs content
        run: pnpm --dir docs --ignore-workspace check
      - name: Build static docs
        run: pnpm --dir docs --ignore-workspace build
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: docs/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
