name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Unit tests
        run: |
          if [ -d tests/unit ]; then uv run pytest -q tests/unit; fi
        shell: bash
      - name: Integration tests
        run: |
          if [ -d tests/integration ]; then uv run pytest -q tests/integration; fi
        shell: bash
      - name: Contract tests
        run: |
          if [ -d tests/contract ]; then uv run pytest -q tests/contract; fi
        shell: bash
      - name: Benchmark smoke
        run: |
          if [ -d tests/benchmarks ]; then uv run pytest -q tests/benchmarks; fi
        shell: bash

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.4'
      - name: Install docs dependencies
        run: pnpm --dir docs install --no-frozen-lockfile
      - name: Generate references
        run: pnpm --dir docs docs:generate-reference
      - name: Build docs
        run: pnpm --dir docs build
      - name: Ensure generated docs are committed
        run: git diff --exit-code -- docs/content/docs/reference/generated

  quality:
    name: Quality and security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync dependencies
        run: uv sync --all-extras --dev
      - name: Pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure
      - name: Dependency audit
        run: uvx pip-audit
