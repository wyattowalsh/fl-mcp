name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
        shell: bash
      - name: Run unit tests
        run: |
          if [ -d tests/unit ]; then
            pytest -q tests/unit
          elif [ -d tests ]; then
            pytest -q -m "not integration and not contract" tests
          else
            echo "No unit tests found; failing to enforce gate."
            exit 1
          fi
        shell: bash

  integration-tests:
    name: Integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
        shell: bash
      - name: Run integration tests
        run: |
          if [ -d tests/integration ]; then
            pytest -q tests/integration
          elif [ -d tests ]; then
            pytest -q -m integration tests
          else
            echo "No integration tests found; failing to enforce gate."
            exit 1
          fi
        shell: bash

  contract-tests:
    name: Contract (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
        shell: bash
      - name: Run contract tests
        run: |
          if [ -d tests/contract ]; then
            pytest -q tests/contract
          elif [ -d tests ]; then
            pytest -q -m contract tests
          else
            echo "No contract tests found; failing to enforce gate."
            exit 1
          fi
        shell: bash

  docs-sync:
    name: Docs generation sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material
      - name: Build docs
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict
          else
            echo "mkdocs.yml not found; skipping site build"
          fi
      - name: Verify generated docs are committed
        run: |
          if [ -f Makefile ] && grep -q "^docs:" Makefile; then
            make docs
          elif [ -f scripts/generate_docs.sh ]; then
            bash scripts/generate_docs.sh
          else
            echo "No docs generation target found; policy requires one."
            exit 1
          fi
          git diff --exit-code

  policy-checks:
    name: Policy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install policy tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pip-audit license-expression
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Dependency vulnerability audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "requirements.txt not found; skipping pip-audit input"
            exit 1
          fi
      - name: License allowlist check
        run: |
          python - <<'PY'
          import pathlib
          forbidden = {"GPL-3.0", "AGPL-3.0"}
          lockfiles = [p for p in [pathlib.Path("requirements.txt"), pathlib.Path("poetry.lock")] if p.exists()]
          if not lockfiles:
            raise SystemExit("No lock/dependency file found for license policy check")
          print("License policy placeholder check passed for", ", ".join(str(p) for p in lockfiles))
          print("Configure a real license scanner as project dependencies stabilize.")
          PY
