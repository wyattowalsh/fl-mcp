name: Stable Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: uv sync --all-extras --dev
      - run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    needs: gates
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-stable
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-stable
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
