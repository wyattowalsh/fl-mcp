name: Stable Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'
      - '!v*.*.*rc*'
      - '!v*.*.*alpha*'
      - '!v*.*.*beta*'

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: none

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Validate stable tag version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          ref_name = "${{ github.ref_name }}".strip()
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = str(pyproject["project"]["version"]).strip()
          if actual != expected:
              raise SystemExit(
                  "Version mismatch: tag version "
                  f"'{expected}' != pyproject project.version '{actual}'."
              )
          print(f"Version gate passed: {actual}")
          PY
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-extras --dev --locked
      - run: uv run ty check --output-format github src/
      - run: uv run pytest -q

  docs:
    runs-on: ubuntu-latest
    needs: gates
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: '9.15.4'
      - name: Sync Python dependencies for docs reference generation
        run: uv sync --all-extras --dev --locked
      - name: Install docs dependencies
        run: pnpm --dir docs --ignore-workspace install --frozen-lockfile
      - name: Verify generated docs references
        run: pnpm --dir docs --ignore-workspace docs:verify-reference
      - name: Lint docs package
        run: pnpm --dir docs --ignore-workspace lint
      - name: Check docs content
        run: pnpm --dir docs --ignore-workspace check
      - name: Build docs
        run: pnpm --dir docs --ignore-workspace build

  build:
    runs-on: ubuntu-latest
    needs: [gates, docs]
    timeout-minutes: 20
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - run: uv sync --all-extras --dev --locked
      - run: uv build
      - name: Validate distributions
        run: uv run --with twine==6.2.0 twine check dist/*
      - name: Validate built artifact versions
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          ref_name = "${{ github.ref_name }}".strip()
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          dist_dir = Path("dist")

          artifacts = [
              path
              for path in sorted(dist_dir.glob("*"))
              if path.is_file() and (path.suffix == ".whl" or path.name.endswith(".tar.gz"))
          ]
          if not artifacts:
              raise SystemExit("No wheel/sdist artifacts found in dist/.")

          def extract_version(path: Path) -> str:
              if path.suffix == ".whl":
                  with zipfile.ZipFile(path) as wheel:
                      metadata_paths = [
                          name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")
                      ]
                      if len(metadata_paths) != 1:
                          raise SystemExit(
                              f"Expected one METADATA file in wheel {path.name}, got {len(metadata_paths)}."
                          )
                      metadata = wheel.read(metadata_paths[0]).decode("utf-8")
              else:
                  with tarfile.open(path, "r:gz") as sdist:
                      member = next(
                          (entry for entry in sdist.getmembers() if entry.name.endswith("PKG-INFO")),
                          None,
                      )
                      if member is None:
                          raise SystemExit(f"PKG-INFO missing in sdist {path.name}.")
                      file_obj = sdist.extractfile(member)
                      if file_obj is None:
                          raise SystemExit(f"Unable to read PKG-INFO from {path.name}.")
                      metadata = file_obj.read().decode("utf-8")

              for line in metadata.splitlines():
                  if line.startswith("Version: "):
                      return line.split(": ", 1)[1].strip()
              raise SystemExit(f"Version field missing in package metadata for {path.name}.")

          for artifact in artifacts:
              actual = extract_version(artifact)
              if actual != expected:
                  raise SystemExit(
                      f"Artifact version mismatch for {artifact.name}: expected {expected}, got {actual}."
                  )
              print(f"{artifact.name}: version {actual} verified")
          PY
      - name: Smoke wheel with uvx
        run: |
          wheel="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected one wheel, found {len(wheels)}.")
          print(wheels[0])
          PY
          )"
          uvx --from "${wheel}" fl-mcp --version
          uvx --from "${wheel}" fl-mcp server run --mode stdio --dry-run
      - name: Generate SHA256SUMS
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist_dir = Path("dist")
          artifacts = sorted(path for path in dist_dir.glob("*") if path.is_file())
          if not artifacts:
              raise SystemExit("No build artifacts found in dist/")

          with (dist_dir / "SHA256SUMS").open("w", encoding="utf-8") as checksum_file:
              for artifact in artifacts:
                  digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
                  checksum_file.write(f"{digest}  {artifact.name}\n")
          PY
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-stable
          path: dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Validate distributions
        run: |
          python -m pip install --upgrade twine==6.2.0
          python -m twine check dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          verbose: true

  github-release:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          make_latest: true
          generate_release_notes: true
          files: dist/*
