name: Stable Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'
      - '!v*.*.*rc*'
      - '!v*.*.*alpha*'
      - '!v*.*.*beta*'

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: none

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate stable tag version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          ref_name = "${{ github.ref_name }}".strip()
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          actual = str(pyproject["project"]["version"]).strip()
          if actual != expected:
              raise SystemExit(
                  "Version mismatch: tag version "
                  f"'{expected}' != pyproject project.version '{actual}'."
              )
          print(f"Version gate passed: {actual}")
          PY
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: uv sync --all-extras --dev --frozen
      - run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    needs: gates
    timeout-minutes: 20
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - run: uv build
      - name: Validate built artifact versions
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          ref_name = "${{ github.ref_name }}".strip()
          expected = ref_name[1:] if ref_name.startswith("v") else ref_name
          dist_dir = Path("dist")

          artifacts = [
              path
              for path in sorted(dist_dir.glob("*"))
              if path.is_file() and (path.suffix == ".whl" or path.name.endswith(".tar.gz"))
          ]
          if not artifacts:
              raise SystemExit("No wheel/sdist artifacts found in dist/.")

          def extract_version(path: Path) -> str:
              if path.suffix == ".whl":
                  with zipfile.ZipFile(path) as wheel:
                      metadata_paths = [
                          name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")
                      ]
                      if len(metadata_paths) != 1:
                          raise SystemExit(
                              f"Expected one METADATA file in wheel {path.name}, got {len(metadata_paths)}."
                          )
                      metadata = wheel.read(metadata_paths[0]).decode("utf-8")
              else:
                  with tarfile.open(path, "r:gz") as sdist:
                      member = next(
                          (entry for entry in sdist.getmembers() if entry.name.endswith("PKG-INFO")),
                          None,
                      )
                      if member is None:
                          raise SystemExit(f"PKG-INFO missing in sdist {path.name}.")
                      file_obj = sdist.extractfile(member)
                      if file_obj is None:
                          raise SystemExit(f"Unable to read PKG-INFO from {path.name}.")
                      metadata = file_obj.read().decode("utf-8")

              for line in metadata.splitlines():
                  if line.startswith("Version: "):
                      return line.split(": ", 1)[1].strip()
              raise SystemExit(f"Version field missing in package metadata for {path.name}.")

          for artifact in artifacts:
              actual = extract_version(artifact)
              if actual != expected:
                  raise SystemExit(
                      f"Artifact version mismatch for {artifact.name}: expected {expected}, got {actual}."
                  )
              print(f"{artifact.name}: version {actual} verified")
          PY
      - name: Generate SHA256SUMS
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist_dir = Path("dist")
          artifacts = sorted(path for path in dist_dir.glob("*") if path.is_file())
          if not artifacts:
              raise SystemExit("No build artifacts found in dist/")

          with (dist_dir / "SHA256SUMS").open("w", encoding="utf-8") as checksum_file:
              for artifact in artifacts:
                  digest = hashlib.sha256(artifact.read_bytes()).hexdigest()
                  checksum_file.write(f"{digest}  {artifact.name}\n")
          PY
      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-stable
          path: dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Validate distributions
        run: |
          python -m pip install --upgrade twine==6.2.0
          python -m twine check dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0
        with:
          packages-dir: dist/
          verbose: true

  github-release:
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist-stable
          path: dist
      - name: Verify SHA256SUMS
        run: |
          cd dist
          sha256sum --check SHA256SUMS
      - uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: dist/*
