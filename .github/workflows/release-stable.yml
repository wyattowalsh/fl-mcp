name: Stable Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  gate-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/unit ]; then pytest -q tests/unit; else echo "missing tests/unit"; exit 1; fi

  gate-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/integration ]; then pytest -q tests/integration; else echo "missing tests/integration"; exit 1; fi

  gate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: |
          if [ -d tests/contract ]; then pytest -q tests/contract; else echo "missing tests/contract"; exit 1; fi

  gate-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          if [ -f Makefile ] && grep -q "^docs:" Makefile; then make docs; else echo "missing docs target"; exit 1; fi
      - run: git diff --exit-code

  gate-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pre-commit pip-audit build twine
      - run: pre-commit run --all-files
      - run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; else echo "missing requirements.txt"; exit 1; fi

  build:
    runs-on: ubuntu-latest
    needs: [gate-unit, gate-integration, gate-contract, gate-docs-sync, gate-policy]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-stable
          path: dist/*

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-stable
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-stable
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  deploy-docs:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Deploy stable docs here (mkdocs gh-deploy, Pages, etc.)"

  publish-docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
